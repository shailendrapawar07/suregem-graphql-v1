enum CompanyType {
  MERCHANT
  RETAILER
}
# ========================================================================================
# =========================== INPUTS DEFINITION ==========================================

# 1: RegisterInput represents the request payload for user registration
input RegisterInput {
  firstName: String!
  lastName: String
  email: String!
  phone: String!
  password: String!
}
# 2: LoginInput  represents the request payload for user login
input LoginInput {
  email: String!
  password: String!
}

# ========================================================================================
# ============================ DATA DEFINITION============================================

type LoginData {
  user: User!
  companyCreated: Boolean!
  companyType: CompanyType
}

# ========================================================================================
# ============================RESPONSE DEFINITION=========================================

#  LoginError represents the response body for user's Un-successfull login
type LoginError {
  success: Boolean!
  message: String!
}
type RegisterError {
  success: Boolean!
  message: String!
}

#  LoginSuccess represents the response body for user successfull login
type LoginSuccess {
  success: Boolean!
  message: String!
  data: LoginData!
}

union LoginResult = LoginSuccess | LoginError

# ========================================================================================
# =============================  RESOLVERS DEFINITION ====================================
extend type Mutation {
  Login(input: LoginInput!): LoginResult!
}
