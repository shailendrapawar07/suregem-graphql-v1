# ========User Schema=========>
type User {
  id: ID!
  firstName: String
  lastName: String
  email: String!
  phone: String!
  isEmailVerified: Boolean!
  isPhoneVerified: Boolean!
  createdAt: String!
  updatedAt: String!
}
type UserResponse {
